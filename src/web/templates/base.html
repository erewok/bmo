<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bmo</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    /* ============================================================
       COLOR PALETTE — dark mode (default)
       ============================================================ */
    :root {
      /* Base surfaces */
      --bg: #0d1117;
      --surface: #161b22;
      --surface-raised: #1c2128;
      --border: #30363d;
      --border-subtle: #21262d;

      /* Text */
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-subtle: #6e7681;

      /* Accent / links */
      --accent: #58a6ff;
      --accent-hover: #79b8ff;

      /* Priority colors */
      --critical: #f85149;
      --high: #d29922;
      --medium: #58a6ff;

      /* Semantic status colors */
      --status-backlog:     #6e7681;
      --status-todo:        #8b949e;
      --status-in-progress: #58a6ff;
      --status-review:      #bc8cff;
      --status-done:        #3fb950;

      /* Legacy aliases kept for backward compat */
      --review-color: #bc8cff;
      --done-color:   #3fb950;

      /* Elevation / shadow */
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.5), 0 2px 4px rgba(0, 0, 0, 0.4);

      /* Transitions */
      --transition-fast: 120ms ease;
      --transition-base: 200ms ease;
    }

    /* ============================================================
       COLOR PALETTE — light mode override
       ============================================================ */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --surface: #f6f8fa;
        --surface-raised: #ffffff;
        --border: #d0d7de;
        --border-subtle: #e8ecf0;

        --text: #1f2328;
        --text-muted: #57606a;
        --text-subtle: #818b98;

        --accent: #0969da;
        --accent-hover: #0550ae;

        --critical: #cf222e;
        --high: #9a6700;
        --medium: #0969da;

        --status-backlog:     #818b98;
        --status-todo:        #57606a;
        --status-in-progress: #0969da;
        --status-review:      #8250df;
        --status-done:        #1a7f37;

        --review-color: #8250df;
        --done-color:   #1a7f37;

        --shadow-sm: 0 1px 3px rgba(27, 31, 36, 0.12), 0 1px 2px rgba(27, 31, 36, 0.08);
        --shadow-md: 0 4px 8px rgba(27, 31, 36, 0.15), 0 2px 4px rgba(27, 31, 36, 0.10);
      }
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       NAVIGATION
       ============================================================ */
    nav {
      padding: 0 24px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 24px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color var(--transition-fast), background var(--transition-fast);
    }

    nav a:first-child {
      display: flex;
      align-items: center;
      color: inherit;
      padding: 0;
      margin-right: 8px;
    }

    nav img.nav-logo {
      height: 28px;
      width: auto;
      display: block;
    }

    nav a:hover {
      color: var(--text);
      background: var(--border-subtle);
      text-decoration: none;
    }

    /* ============================================================
       MAIN CONTENT AREA
       ============================================================ */
    main {
      flex: 1;
      padding: 24px;
    }

    /* ============================================================
       TYPOGRAPHY
       ============================================================ */
    h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
      color: var(--text);
    }

    h2 {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      margin: 28px 0 12px;
      color: var(--text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    /* ============================================================
       BOARD LAYOUT
       ============================================================ */
    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 12px;
      overflow-x: hidden;
      align-items: stretch;
      padding-bottom: 12px;
      max-width: 1800px;
      margin-inline: auto;
    }

    .column {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--surface);
      border-radius: 8px;
      padding: 8px;
    }

    ul.card-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .column-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 8px 4px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .count {
      margin-left: auto;
      background: var(--border);
      color: var(--text-subtle);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 12px;
      letter-spacing: 0;
    }

    /* ============================================================
       CARDS
       ============================================================ */
    .card {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--transition-base), box-shadow var(--transition-base), transform var(--transition-base);
      cursor: default;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .card-id {
      font-size: 11px;
      color: var(--text-subtle);
      font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", monospace;
      letter-spacing: 0.02em;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      margin: 5px 0 0;
      line-height: 1.45;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .card-title a {
      color: var(--text);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .card-title a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }



    /* ============================================================
       BADGES
       ============================================================ */
    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      line-height: 1.6;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    /* Priority badges */
    .priority-critical { background: color-mix(in srgb, var(--critical) 15%, transparent); color: var(--critical); }
    .priority-high     { background: color-mix(in srgb, var(--high)     15%, transparent); color: var(--high); }
    .priority-medium   { background: color-mix(in srgb, var(--medium)   15%, transparent); color: var(--medium); }
    .priority-low      { background: color-mix(in srgb, var(--text-muted) 12%, transparent); color: var(--text-muted); }
    .priority-none     { background: color-mix(in srgb, var(--text-muted)  8%, transparent); color: var(--text-subtle); }

    /* Kind badges */
    .kind-bug     { background: color-mix(in srgb, var(--critical)     15%, transparent); color: var(--critical); }
    .kind-feature { background: color-mix(in srgb, var(--status-done)  15%, transparent); color: var(--status-done); }
    .kind-task    { background: color-mix(in srgb, var(--medium)       15%, transparent); color: var(--medium); }
    .kind-epic    { background: color-mix(in srgb, var(--status-review) 15%, transparent); color: var(--status-review); }
    .kind-chore   { background: color-mix(in srgb, var(--high)         15%, transparent); color: var(--high); }

    /* Status badges */
    .status-backlog     { background: color-mix(in srgb, var(--status-backlog)     15%, transparent); color: var(--status-backlog); }
    .status-todo        { background: color-mix(in srgb, var(--status-todo)        15%, transparent); color: var(--status-todo); }
    .status-in-progress { background: color-mix(in srgb, var(--status-in-progress) 15%, transparent); color: var(--status-in-progress); }
    .status-review      { background: color-mix(in srgb, var(--status-review)      15%, transparent); color: var(--status-review); }
    .status-done        { background: color-mix(in srgb, var(--status-done)        15%, transparent); color: var(--status-done); }

    /* ============================================================
       TABLE (issue list)
       ============================================================ */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-subtle);
    }

    th {
      font-weight: 700;
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom-color: var(--border);
      background: var(--surface);
    }

    tbody tr {
      transition: background var(--transition-fast);
    }

    tbody tr:hover td {
      background: color-mix(in srgb, var(--accent) 5%, var(--bg));
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* ============================================================
       ISSUE DETAIL
       ============================================================ */
    .issue-detail {
      max-width: 860px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 14px 0;
    }

    .description {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      font-size: 15px;
      line-height: 1.75;
      margin: 18px 0;
      color: var(--text);
    }

    /* Prose styles for rendered markdown inside .description and .comment-body */
    .description p, .comment-body p {
      margin: 0 0 12px;
    }

    .description p:last-child, .comment-body p:last-child {
      margin-bottom: 0;
    }

    .description ul, .description ol,
    .comment-body ul, .comment-body ol {
      margin: 0 0 12px;
      padding-left: 24px;
    }

    .description li, .comment-body li {
      margin-bottom: 4px;
    }

    .description h1, .description h2, .description h3,
    .description h4, .description h5, .description h6,
    .comment-body h1, .comment-body h2, .comment-body h3,
    .comment-body h4, .comment-body h5, .comment-body h6 {
      color: var(--text);
      font-weight: 600;
      line-height: 1.3;
      margin: 16px 0 8px;
    }

    .description h1, .comment-body h1 { font-size: 18px; }
    .description h2, .comment-body h2 { font-size: 16px; }
    .description h3, .comment-body h3 { font-size: 14px; }
    .description h4, .comment-body h4 { font-size: 13px; }

    .description code, .comment-body code {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", monospace;
      font-size: 12px;
      color: var(--text);
    }

    .description pre, .comment-body pre {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 0 0 12px;
    }

    .description pre code, .comment-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 12px;
    }

    .description blockquote, .comment-body blockquote {
      border-left: 3px solid var(--border);
      margin: 0 0 12px;
      padding: 4px 0 4px 16px;
      color: var(--text-muted);
    }

    .description a, .comment-body a {
      color: var(--accent);
    }

    .description a:hover, .comment-body a:hover {
      color: var(--accent-hover);
    }

    .description hr, .comment-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .comment {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.65;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--transition-fast);
    }

    .comment:hover {
      border-color: var(--border);
    }

    .comment strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ============================================================
       BUTTONS — base styles for use by later template phases
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-raised);
      color: var(--text);
      cursor: pointer;
      line-height: 1.4;
      text-decoration: none;
      transition: background var(--transition-fast), border-color var(--transition-fast), box-shadow var(--transition-fast);
      white-space: nowrap;
      user-select: none;
    }

    .btn:hover {
      background: var(--border-subtle);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
      text-decoration: none;
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: none;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #ffffff;
    }

    @media (prefers-color-scheme: light) {
      .btn-primary {
        color: #ffffff;
      }
    }

    /* ============================================================
       PAGE CONTAINER — centered content wrapper for non-board pages
       ============================================================ */
    .page-container {
      max-width: 1400px;
      margin-inline: auto;
      width: 100%;
    }

    /* ============================================================
       RESPONSIVE — narrow viewport fallback for board
       ============================================================ */
    @media (max-width: 1023px) {
      .board {
        overflow-x: auto;
        grid-template-columns: repeat(5, minmax(200px, 1fr));
      }
    }

    /* ============================================================
       REDUCED MOTION
       ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      .column {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/board"><img src="/logo.png" alt="bmo" class="nav-logo"></a>
    <a href="/issues">Issues</a>
    <a href="/graph">Graph</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
